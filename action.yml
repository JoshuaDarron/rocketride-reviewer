name: "RocketRide PR Reviewer"
description: "Multi-agent AI code review using Claude, GPT, and Gemini via RocketRide"
author: "Joshua Phillips"

branding:
  icon: "code"
  color: "blue"

inputs:
  openai_api_key:
    description: "OpenAI API key for GPT reviewer agent"
    required: true
  anthropic_api_key:
    description: "Anthropic API key for Claude reviewer and aggregator"
    required: true
  google_api_key:
    description: "Google AI API key for Gemini reviewer agent"
    required: true
  claude_app_id:
    description: "GitHub App ID for claude-reviewer[bot]"
    required: true
  claude_app_private_key:
    description: "GitHub App private key for claude-reviewer[bot]"
    required: true
  gpt_app_id:
    description: "GitHub App ID for gpt-reviewer[bot]"
    required: true
  gpt_app_private_key:
    description: "GitHub App private key for gpt-reviewer[bot]"
    required: true
  gemini_app_id:
    description: "GitHub App ID for gemini-reviewer[bot]"
    required: true
  gemini_app_private_key:
    description: "GitHub App private key for gemini-reviewer[bot]"
    required: true
  target_branch:
    description: "Only review PRs targeting this branch"
    required: false
    default: "main"
  review_context:
    description: "Review scope: 'full' (include file context) or 'diff' (diff only)"
    required: false
    default: "full"
  config_path:
    description: "Path to .rocketride-review.yml config file"
    required: false
    default: ".rocketride-review.yml"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run RocketRide Reviewer
      shell: bash
      env:
        INPUT_OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        INPUT_GOOGLE_API_KEY: ${{ inputs.google_api_key }}
        INPUT_CLAUDE_APP_ID: ${{ inputs.claude_app_id }}
        INPUT_CLAUDE_APP_PRIVATE_KEY: ${{ inputs.claude_app_private_key }}
        INPUT_GPT_APP_ID: ${{ inputs.gpt_app_id }}
        INPUT_GPT_APP_PRIVATE_KEY: ${{ inputs.gpt_app_private_key }}
        INPUT_GEMINI_APP_ID: ${{ inputs.gemini_app_id }}
        INPUT_GEMINI_APP_PRIVATE_KEY: ${{ inputs.gemini_app_private_key }}
        INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
        INPUT_REVIEW_CONTEXT: ${{ inputs.review_context }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
      run: python -m src.main
      working-directory: ${{ github.action_path }}
